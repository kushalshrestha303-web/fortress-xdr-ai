apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-api
  namespace: nepal-fortress-one
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fortress-api
  template:
    metadata:
      labels:
        app: fortress-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/nepal-fortress-one/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: fortress-api-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fortress-api
  namespace: nepal-fortress-one
spec:
  selector:
    app: fortress-api
  ports:
    - port: 8080
      targetPort: 8080

